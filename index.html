
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Hills School PRO</title>

<meta name="theme-color" content="#00c6ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

.app{max-width:500px;margin:auto;padding:15px;}

.header{text-align:center;padding:15px 0;font-size:22px;font-weight:600;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

input,select{width:100%;padding:10px;margin:6px 0;border:none;border-radius:8px;}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  cursor:pointer;
}

.student{
  border:1px solid rgba(255,255,255,0.2);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.student-name{
  font-size:22px;
  font-weight:700;
  text-shadow:0 0 10px #00c6ff;
}

.badge{padding:3px 8px;border-radius:5px;font-size:11px;background:#00c6ff;display:inline-block;}
.weak{background:#ff4d4d;padding:5px 8px;border-radius:8px;font-size:12px;margin-top:5px;display:inline-block;}
.good{background:#00d084;}

.deleteBtn{background:#ff4d4d;margin-top:8px;}
.waBtn{background:#25D366;margin-top:8px;}
.saveBtn{background:#ffa500;margin-top:8px;}

.reportBox{
  font-size:13px;
  margin-top:10px;
  padding:10px;
  border-left:4px solid #00c6ff;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

/* BUTTON */
.historyBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#00c6ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
}

/* POPUP */
.historyPopup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.popupContent{
  width:90%;
  max-height:80%;
  overflow:auto;
  background:#1e2f3a;
  padding:15px;
  border-radius:15px;
}

.closeBtn{background:#ff4d4d;}
</style>
</head>

<body>

<div class="app">

<div class="header">📘 Pine Hills School PRO SYSTEM</div>

<div class="card">
<input type="text" id="studentName" placeholder="Enter Student Name">

<select id="studentClass">
<option value="">Select Class</option>
<option>KG 1</option><option>KG 2</option>
<option>Class 1</option><option>Class 2</option>
<option>Class 3</option><option>Class 4</option>
<option>Class 5</option><option>Class 6</option>
<option>Class 7</option><option>Class 8</option>
<option>Class 9</option>
</select>

<input type="text" id="studentSubject" placeholder="Enter Subject">

<button onclick="addStudent()">➕ Add Student</button>
</div>

<div class="card">
<h3>📋 Students</h3>
<div id="students"></div>
</div>

</div>

<div class="historyBtn" onclick="openHistory()">📜</div>

<div class="historyPopup" id="historyPopup">
<div class="popupContent">
<button class="closeBtn" onclick="closeHistory()">❌ Close</button>
<h3>🧾 Saved Reports</h3>
<div id="reports"></div>
</div>
</div>

<script>

let students = JSON.parse(localStorage.getItem('students')) || [];
let reports = JSON.parse(localStorage.getItem('reports')) || [];

function score(s){
  let sc=0;
  if(s.attendance!=='Absent') sc++;
  if(s.copy==='Good Copy') sc++;
  if(s.homework==='Homework Complete') sc++;
  if(s.dress==='Complete') sc++;
  if(s.behavior==='Good Behavior') sc++;
  return sc;
}

function percentage(s){
  return Math.round((score(s)/5)*100);
}

function isWeak(s){return score(s)<=2;}
function isTop(s){return score(s)>=4;}

function addStudent(){
  let name=studentName.value;
  let cls=studentClass.value;
  let subject=document.getElementById('studentSubject').value;

  if(!name||!cls||!subject) return;

  students.push({
    name,
    class:cls,
    subject:subject,
    attendance:'Present',
    copy:'Good Copy',
    homework:'Homework Complete',
    dress:'Complete',
    behavior:'Good Behavior'
  });

  save(); render();

  studentName.value='';
  studentClass.value='';
  document.getElementById('studentSubject').value='';
}

function save(){
  localStorage.setItem('students',JSON.stringify(students));
}

function update(i,k,v){
  students[i][k]=v;
  save(); render();
}

function deleteStudent(i){
  students.splice(i,1);
  save(); render();
}

function deleteReport(i){
  reports.splice(i,1);
  localStorage.setItem('reports',JSON.stringify(reports));
  renderReports();
}

function saveReport(i){
  let s=students[i];
  let text;

  if(s.attendance === 'Absent'){
    text=`📘 Report
Name: ${s.name}
Class: ${s.class}
Subject: ${s.subject}
❌ Status: Absent`;
  } else {
    text=`📘 Report
Name: ${s.name}
Class: ${s.class}
Subject: ${s.subject}
Attendance: ${s.attendance}
Copy: ${s.copy}
Homework: ${s.homework}
Dress: ${s.dress}
Behavior: ${s.behavior}
📊 Percentage: ${percentage(s)}%`;
  }

  reports.unshift({text,time:new Date().toLocaleString()});
  localStorage.setItem('reports',JSON.stringify(reports));
  renderReports();
}

function sendWA(i){
  let s = students[i];

  const icon = {
    report: "\u{1F4D8}",
    user: "\u{1F464}",
    school: "\u{1F3EB}",
    book: "\u{1F4DA}",
    calendar: "\u{1F4C5}",
    copy: "\u{1F4D6}",
    homework: "\u{1F4DD}",
    dress: "\u{1F455}",
    behavior: "\u{1F642}",
    chart: "\u{1F4CA}",
    ok: "\u2705",
    no: "\u274C",
    warn: "\u26A0"
  };

  function mark(value, goodValues){
    return goodValues.includes(value) ? icon.ok : icon.no;
  }

  let text;

  if(s.attendance === 'Absent'){
    text = `${icon.report} *STUDENT REPORT*

${icon.user} *Name:* ${s.name}
${icon.school} *Class:* ${s.class}
${icon.book} *Subject:* ${s.subject}

━━━━━━━━━━━━━━

${icon.calendar} Attendance: ${icon.no} Absent

${icon.warn} *Student was absent today.*`;
  } else {
    text = `${icon.report} *STUDENT REPORT*

${icon.user} *Name:* ${s.name}
${icon.school} *Class:* ${s.class}
${icon.book} *Subject:* ${s.subject}

━━━━━━━━━━━━━━

${icon.calendar} Attendance: ${mark(s.attendance,['Present'])} ${s.attendance}
${icon.copy} Copy: ${mark(s.copy,['Good Copy'])} ${s.copy}
${icon.homework} Homework: ${mark(s.homework,['Homework Complete'])} ${s.homework}
${icon.dress} Dress: ${mark(s.dress,['Complete'])} ${s.dress}
${icon.behavior} Behavior: ${mark(s.behavior,['Good Behavior'])} ${s.behavior}

━━━━━━━━━━━━━━

${icon.chart} *Performance:* ${percentage(s)}%`;
  }

  saveReport(i);

  let url = "https://wa.me/923128499442?text=" + encodeURIComponent(text);
  window.open(url,'_blank');
}

/* 🔥 CLEAN + COLOR REPORT */
function renderReports(){
  let box=document.getElementById('reports');
  box.innerHTML='';

  reports.forEach((r,i)=>{

    let formatted = r.text
      .replace(/📘 Report/g,'<b style=\"color:#00c6ff;\">📘 Student Report</b><br><br>')
      .replace(/Name:/g,'<b>👤 Name:</b>')
      .replace(/Class:/g,'<b>🏫 Class:</b>')
      .replace(/Subject:/g,'<b>📚 Subject:</b>')
      .replace(/Attendance:/g,'<b>📅 Attendance:</b>')
      .replace(/Copy:/g,'<b>📖 Copy:</b>')
      .replace(/Homework:/g,'<b>📝 Homework:</b>')
      .replace(/Dress:/g,'<b>👕 Dress:</b>')
      .replace(/Behavior:/g,'<b>🙂 Behavior:</b>')
      .replace(/Percentage:/g,'<b>📊 Percentage:</b>')

      // RED
      .replace(/Absent/g,'<span style=\"color:red;\">Absent</span>')
      .replace(/Bad Copy/g,'<span style=\"color:red;\">Bad Copy</span>')
      .replace(/Not Done/g,'<span style=\"color:red;\">Not Done</span>')
      .replace(/Incomplete/g,'<span style=\"color:red;\">Incomplete</span>')
      .replace(/Bad Behavior/g,'<span style=\"color:red;\">Bad Behavior</span>')

      // GREEN
      .replace(/Present/g,'<span style=\"color:#00ff99;\">Present</span>')
      .replace(/Good Copy/g,'<span style=\"color:#00ff99;\">Good Copy</span>')
      .replace(/Homework Complete/g,'<span style=\"color:#00ff99;\">Homework Complete</span>')
      .replace(/Complete/g,'<span style=\"color:#00ff99;\">Complete</span>')
      .replace(/Good Behavior/g,'<span style=\"color:#00ff99;\">Good Behavior</span>')

      .replace(/\n/g,'<br>');

    box.innerHTML+=`
    <div class='reportBox'>
      ${formatted}
      <br><br>
      <small>⏰ ${r.time}</small>
      <br>
      <button class='deleteBtn' onclick='deleteReport(${i})'>❌ Delete</button>
    </div>`;
  });
}

function render(){
  let box=document.getElementById('students');
  box.innerHTML='';

  students.slice().reverse().forEach((s,idx)=>{
    let i = students.length - 1 - idx;
    let hide = s.attendance==='Absent';

    box.innerHTML+=`
    <div class='student'>
      <div class='student-name'>👤 ${s.name}</div>
      <div class='badge'>${s.class} | ${s.subject} | Score:${score(s)} | ${percentage(s)}%</div>

      ${isWeak(s)?'<div class=\"weak\">⚠ Weak</div>':''}
      ${isTop(s)?'<div class=\"weak good\">🏆 Top</div>':''}

      <select onchange="update(${i},'attendance',this.value)">
        <option ${s.attendance=='Present'?'selected':''}>Present</option>
        <option ${s.attendance=='Absent'?'selected':''}>Absent</option>
      </select>

      ${hide ? '<div class=\"weak\">❌ Absent - No Details</div>' : `
      <select onchange="update(${i},'copy',this.value)">
        <option ${s.copy=='Good Copy'?'selected':''}>Good Copy</option>
        <option ${s.copy=='Bad Copy'?'selected':''}>Bad Copy</option>
      </select>

      <select onchange="update(${i},'homework',this.value)">
        <option ${s.homework=='Homework Complete'?'selected':''}>Homework Complete</option>
        <option ${s.homework=='Not Done'?'selected':''}>Not Done</option>
      </select>

      <select onchange="update(${i},'dress',this.value)">
        <option ${s.dress=='Complete'?'selected':''}>Complete</option>
        <option ${s.dress=='Incomplete'?'selected':''}>Incomplete</option>
      </select>

      <select onchange="update(${i},'behavior',this.value)">
        <option ${s.behavior=='Good Behavior'?'selected':''}>Good Behavior</option>
        <option ${s.behavior=='Bad Behavior'?'selected':''}>Bad Behavior</option>
      </select>
      `}

      <button class='saveBtn' onclick='saveReport(${i})'>💾 Save Report</button>
      <button class='waBtn' onclick='sendWA(${i})'>📲 WhatsApp Send</button>
      <button class='deleteBtn' onclick='deleteStudent(${i})'>❌ Delete</button>
    </div>`;
  });

  renderReports();
}

function openHistory(){
  document.getElementById('historyPopup').style.display='flex';
}

function closeHistory(){
  document.getElementById('historyPopup').style.display='none';
}

render();

</script>


<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>

</body>
</html>
